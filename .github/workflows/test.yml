name: Test template

# Runs the template's ___TESTS___ scenarios headlessly on every PR and on pushes
# to master. The scenarios live in template.tpl (the same ones runnable in the GTM
# UI "Tests" tab); test/run-tpl-tests.mjs shims GTM's Test API and executes the
# real sandboxed source under Node's built-in test runner. This gates the routing
# logic so regressions can't merge.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Run template tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test
